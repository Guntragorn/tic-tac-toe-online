<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe Dark</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1000px;
        }

        .game {
            flex: 1;
            text-align: center;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 2em;
            text-align: center;
            line-height: 100px;
            border: 2px solid white; /* 🔥 แก้ให้เห็นชัด */
            cursor: pointer;
        }

        .cell:hover {
            background: rgba(255,255,255,0.1);
        }

        input {
            background: black;
            color: white;            /* 🔥 แก้ปัญหาชื่อหาย */
            border: 1px solid white;
            padding: 5px 10px;
            margin: 5px;
            caret-color: white;      /* 🔥 cursor ขาว */
        }

        button {
            background: black;
            color: white;
            border: 1px solid white;
            padding: 5px 10px;
            margin: 5px;
            cursor: pointer;
        }

        button:hover {
            background: white;
            color: black;
        }

        .lobby {
            width: 250px;
            border-left: 1px solid white;
            padding-left: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- เกม -->
    <div class="game">
        <h2>Tic Tac Toe</h2>

        <input id="name" placeholder="ใส่ชื่อ">
        <button onclick="join()">เข้าเกม</button>

        <h3 id="status"></h3>

        <button onclick="bePlayer()">เป็นผู้เล่น</button>
        <button onclick="beSpectator()">เป็นผู้ชม</button>
        <button onclick="resetGame()">รีเซ็ต</button>

        <div class="board" id="board"></div>
    </div>

    <!-- Lobby -->
    <div class="lobby">
        <h3>Lobby</h3>
        <ul id="lobby"></ul>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const boardDiv = document.getElementById("board");
const lobbyDiv = document.getElementById("lobby");
const statusText = document.getElementById("status");

let myRole = "spectator";
let board = [];
let gameActive = false;

// สร้างช่อง
for (let i = 0; i < 9; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");

    cell.onclick = () => {
        socket.emit("move", i);
    };

    boardDiv.appendChild(cell);
}

// join
function join() {
    const name = document.getElementById("name").value;
    socket.emit("join", name);
}

// roles
function bePlayer() {
    socket.emit("bePlayer");
}

function beSpectator() {
    socket.emit("beSpectator");
}

// reset
function resetGame() {
    socket.emit("reset");
    gameActive = false;
    statusText.textContent = "";
}

// lobby
socket.on("lobby", (users) => {
    lobbyDiv.innerHTML = "";

    for (let id in users) {
        const li = document.createElement("li");
        li.textContent = users[id].name + " (" + users[id].role + ")";
        lobbyDiv.appendChild(li);

        if (id === socket.id) {
            myRole = users[id].role;
        }
    }
});

// update เกม
socket.on("update", (data) => {
    board = data.board;

    document.querySelectorAll(".cell").forEach((cell, i) => {
        cell.textContent = board[i];
    });

    if (board.some(cell => cell !== "")) {
        gameActive = true;
    }

    statusText.textContent = gameActive ? "ตา: " + data.currentTurn : "";
});

// ผู้ชนะ
socket.on("gameOver", (winner) => {
    alert("ผู้ชนะคือ " + winner);

    gameActive = false;
    statusText.textContent = "";
});
</script>

</body>
</html>
